[project]
name = "projetrst"
version = "1.0.0"
description = "ProjetRST — modèle de documentation en RST"
authors = [{ name = "Teremu" }]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "sphinx",
]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
